name: Deploy Backend

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile backend/config.py
          python -m py_compile backend/chat_util.py
          python -m py_compile backend/persona.py
          python -m py_compile backend/rag_engine.py
          python -m py_compile backend/server.py
          python -m py_compile backend/github_source.py
          python -m py_compile backend/parsers/__init__.py
          python -m py_compile backend/parsers/md_loader.py
          python -m py_compile backend/parsers/html_loader.py
          python -m py_compile backend/parsers/json_loader.py
          python -m py_compile backend/parsers/txt_loader.py

      - name: Build knowledge index (dry run)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_DEEPSEEKV4FLASH_AIRAGSITECHAT }}
        run: |
          echo "Indexing knowledge-base/ (dry run)..."
          python -c "
          import backend.config as cfg
          from backend.parsers import load_markdown_files
          files = load_markdown_files(cfg.KNOWLEDGE_BASE_DIR)
          print(f'Found {len(files)} markdown files in knowledge-base/')
          "

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
