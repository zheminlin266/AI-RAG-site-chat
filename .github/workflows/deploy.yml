name: Publish Docker image

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Type-check React component
        run: |
          npm install --ignore-scripts
          npm run typecheck

      - name: Syntax check
        run: |
          python -m py_compile backend/config.py
          python -m py_compile backend/chat_util.py
          python -m py_compile backend/persona.py
          python -m py_compile backend/rag_engine.py
          python -m py_compile backend/server.py
          python -m py_compile backend/github_source.py
          python -m py_compile backend/parsers/__init__.py
          python -m py_compile backend/parsers/md_loader.py
          python -m py_compile backend/parsers/html_loader.py
          python -m py_compile backend/parsers/json_loader.py
          python -m py_compile backend/parsers/txt_loader.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Check standalone widget syntax
        run: |
          node --check frontend/standalone/ai-rag-chat.js
          node -e "const registry=new Map(); global.customElements={get:n=>registry.get(n),define:(n,c)=>registry.set(n,c)}; global.window={customElements:global.customElements}; global.HTMLElement=class {}; require('./frontend/standalone/ai-rag-chat.js'); const check=customElements.get('ai-rag-chat').selfCheck(); if(!check.defined || check.maxCharacters!==4000 || check.maxMessages!==40) throw new Error(JSON.stringify(check));"

      - name: Check knowledge-base discovery
        run: |
          echo "Indexing knowledge-base/ (dry run)..."
          python -c "
          import backend.config as cfg
          from backend.parsers import load_markdown_files
          files = load_markdown_files(cfg.KNOWLEDGE_BASE_DIR)
          print(f'Found {len(files)} markdown files in knowledge-base/')
          "

  publish:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Normalize image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
